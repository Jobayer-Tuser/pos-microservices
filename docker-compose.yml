services:
  eureka-server:
    build:
      context: .
      dockerfile: ServiceDiscovery/Dockerfile
      target: dev
    ports:
      - "8761:8761"
    networks:
      - microservice-network
    develop:
      watch:
        - path: ./ServiceDiscovery/src
          action: sync+restart
          target: /app/ServiceDiscovery/src
        - path: ./UtilityResource/src
          action: sync+restart
          target: /app/UtilityResource/src
        - path: ./ServiceDiscovery/pom.xml
          action: rebuild

  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
      target: dev
    ports:
      - "9010:9010"
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
    depends_on:
      - eureka-server
    networks:
      - microservice-network
    develop:
      watch:
        - path: ./ApiGateway/src
          action: sync+restart
          target: /app/ApiGateway/src
        - path: ./UtilityResource/src
          action: sync+restart
          target: /app/UtilityResource/src
        - path: ./ApiGateway/pom.xml
          action: rebuild

  user-service:
    build:
      context: .
      dockerfile: UserService/Dockerfile
      target: dev
    ports:
      - "9012:9012"
      - "5006:5005"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: pos_user_service
      DB_USER: ${MYSQL_DB_USERNAME}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      MAVEN_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - microservice-network
    develop:
      watch:
        - path: ./UserService/src
          action: sync+restart
          target: /app/UserService/src
        - path: ./UtilityResource/src
          action: sync+restart
          target: /app/UtilityResource/src
        - path: ./UserService/pom.xml
          action: rebuild

  auth-service:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
      target: dev
    ports:
      - "9031:9031"
      - "5005:5005"
    environment:
      DB_HOST: mysql-db
      DB_PORT: 3306
      DB_NAME: pos_auth_service
      DB_USER: ${MYSQL_DB_USERNAME}
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_SERVER_HOST: eureka-server
      EUREKA_SERVER_PORT: ${EUREKA_SERVER_PORT}
      SPRING_DEVTOOLS_RESTART_ENABLED: true
      MAVEN_OPTS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    depends_on:
      mysql-db:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - microservice-network
    develop:
      watch:
        - path: ./AuthService/src
          action: sync+restart
          target: /app/AuthService/src
        - path: ./UtilityResource/src
          action: sync+restart
          target: /app/UtilityResource/src
        - path: ./AuthService/pom.xml
          action: rebuild

  mysql-db:
    image: "mysql:8.4"
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_DB_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD}
#      MYSQL_DATABASE: ${MYSQL_DB_NAME}
    volumes:
      - microservice-mysql:/var/lib/mysql
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u${MYSQL_DB_USERNAME}", "-p${MYSQL_DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres-db:
    image: "postgres:15-alpine"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    networks:
      - microservice-network
    volumes:
      - microservice-postgres:/var/lib/postgresql/data

  pgAdmin:
    image: "dpage/pgadmin4"
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "user@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "superpass"
    depends_on:
      - postgres-db
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge

volumes:
  microservice-postgres:
  microservice-mysql: