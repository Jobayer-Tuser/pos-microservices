server:
  port: 9015

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ProductService

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME}?rewriteBatchedStatements=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        default_batch_fetch_size: 50
        order_updates: true
        order_inserts: true
        format_sql: true
        ddl-auto: none
        jdbc:
          batch_size: 50
          batch_versioned_data: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_SERVER_HOST:localhost}:${EUREKA_SERVER_PORT:8761}/eureka/